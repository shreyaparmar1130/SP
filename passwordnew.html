<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      width: 400px;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .password-box {
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 16px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #667eea;
    }

    .strength-bar {
      width: 100%;
      height: 12px;
      background: #ddd;
      border-radius: 10px;
      margin-top: 15px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: 0.4s;
    }

    .info {
      margin-top: 15px;
    }

    .strength-text {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .tips {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      color: #444;
    }

    .percentage {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
      color: #222;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Password Strength Checker</h2>

    <div class="password-box">
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>

    <div class="info">
      <div class="strength-text" id="strengthText">Strength: None</div>

      <div class="percentage" id="percentage">
        Password Strength: 0%
      </div>

      <div class="tips" id="tips">
        Tips will appear here...
      </div>
    </div>
  </div>

  <script>
    const password = document.getElementById("password");
    const strengthFill = document.getElementById("strengthFill");
    const strengthText = document.getElementById("strengthText");
    const percentage = document.getElementById("percentage");
    const tips = document.getElementById("tips");

    password.addEventListener("input", checkStrength);

    function checkStrength() {
      let pass = password.value;
      let score = 0;
      let message = "";
      let color = "";

      // Password rules
      if (pass.length >= 8) score += 25;
      if (/[A-Z]/.test(pass)) score += 25;
      if (/[0-9]/.test(pass)) score += 25;
      if (/[@$!%*?&]/.test(pass)) score += 25;

      // Strength Levels
      if (score <= 25) {
        message = "Weak";
        color = "#ff4d4d";

        tips.innerHTML = `
          • Use at least 8 characters <br>
          • Add uppercase letters <br>
          • Include numbers and symbols
        `;

      } else if (score <= 50) {
        message = "Medium";
        color = "#ff9800";

        tips.innerHTML = `
          • Add special characters <br>
          • Make password longer <br>
          • Mix letters and numbers
        `;

      } else if (score <= 75) {
        message = "Good";
        color = "#2196f3";

        tips.innerHTML = `
          • Your password is good <br>
          • Add more unique symbols for extra security
        `;

      } else {
        message = "Strong";
        color = "#4caf50";

        tips.innerHTML = `
          • Excellent password! <br>
          • Your password looks secure
        `;
      }

      // Update UI
      strengthFill.style.width = score + "%";
      strengthFill.style.background = color;

      strengthText.innerHTML = "Strength: " + message;
      strengthText.style.color = color;

      percentage.innerHTML = "Password Strength: " + score + "%";
    }
  </script>

</body>
</html>
